<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Histórico</title>
</head>

<body>

    <aside class="sidebar">
        <div class="sidebar-topo">
            <h2>Sistema de Triagem</h2>
            <p>Glaucoma</p>
        </div>

        <nav class="sidebar-menu">
            <a href="Dashboard.html">Dashboard</a>
            <a href="NovaAnalise.html">Nova Análise</a>
            <a href="Historico.html" class="ativo">Histórico</a>
            <a href="ResultadoIA.html">Resultado IA</a>
            <a href="FilaPrioridade.html">Fila de Prioridade</a>
            <a href="Metricas.html">Métricas</a>
        </nav>

        <div class="sidebar-rodape">
            <span>Administrador</span>
        </div>
    </aside>

    <main class="main">

        <header class="page-header">
            <div>
                <h1>Histórico</h1>
                <p>Consulte exames já processados.</p>
            </div>
        </header>

        <div class="filtros">

            <div class="form-group">
                <label>ID do Paciente</label>
                <input
                    type="text"
                    id="filtroPaciente"
                    placeholder="Pesquisar paciente">
            </div>

            <button class="button" onclick="carregarHistorico()">
                Atualizar
            </button>

        </div>

        <section class="table-container">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Imagem</th>
                        <th>Score</th>
                    </tr>
                </thead>

                <tbody id="historico-body">
                    <tr>
                        <td colspan="3">
                            Carregando...
                        </td>
                    </tr>
                </tbody>

            </table>

        </section>

    </main>

<script>

async function carregarHistorico() {

    try {

        const resposta = await fetch(
            "http://127.0.0.1:8000/pacientes"
        );

        const pacientes = await resposta.json();

        const filtro =
            document.getElementById("filtroPaciente")
            .value
            .trim();

        const tbody =
            document.getElementById("historico-body");

        tbody.innerHTML = "";

        let lista = pacientes;

        if (filtro !== "") {

            lista = pacientes.filter(
                paciente =>
                    paciente.id
                    .toString()
                    .includes(filtro)
            );
        }

        if (lista.length === 0) {

            tbody.innerHTML = `
                <tr>
                    <td colspan="3">
                        Nenhum paciente encontrado
                    </td>
                </tr>
            `;

            return;
        }

        lista.forEach(paciente => {

            tbody.innerHTML += `
                <tr>
                    <td>${paciente.id}</td>
                    <td>${paciente.imagem}</td>
                    <td>${(paciente.score * 100).toFixed(2)}%</td>
                </tr>
            `;
        });

    }
    catch (erro) {

        console.error(erro);

        document.getElementById(
            "historico-body"
        ).innerHTML = `
            <tr>
                <td colspan="3">
                    Erro ao conectar com a API
                </td>
            </tr>
        `;
    }
}

window.onload = carregarHistorico;

</script>

</body>
</html>
