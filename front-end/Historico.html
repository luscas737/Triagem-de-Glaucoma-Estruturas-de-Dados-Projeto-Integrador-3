<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title> Histórico </title> 
</head>
<script>
async function carregarHistorico() {

    const resposta = await fetch(
        "http://127.0.0.1:8000/pacientes"
    );

    const dados = await resposta.json();

    const tbody = document.getElementById("historico-body");

    tbody.innerHTML = "";

    dados.forEach(paciente => {

        tbody.innerHTML += `
        <tr>
            <td>${paciente.id}</td>
            <td>${new Date().toLocaleDateString()}</td>
            <td class="concluido">Concluído</td>
            <td>${(paciente.score * 100).toFixed(2)}%</td>
        </tr>
        `;
    });
}

carregarHistorico();

</script>
<body>


    
    <aside class="sidebar">
    <div class="sidebar-topo">
        <h2>Sistema de Triagem</h2>
        <p>Glaucoma</p>
    </div>
    <nav class="sidebar-menu">
        <a href="Dashboard.html">
            Dashboard
        </a>
        <a href="NovaAnalise.html">
            Nova Análise
        </a>
        <a href="Historico.html" class="ativo">
            Histórico
        </a>
        <a href="ResultadoIA.html">
            Resultado IA
        </a>
        <a href="FilaPrioridade.html">
            Fila de Prioridade
        </a>
        <a href="Metricas.html">
            Métricas
        </a>
    </nav>
    <div class="sidebar-rodape">
        <span>Administrador</span>
    </div>
    </aside>
    <main class="main">
        <header class="page-header">
            <div>
                <h1>Histórico</h1>
                <p>Consulte exames já processados.</p>
            </div>
        </header>
        <div class="filtros">
            <div class="form-group">
                <label>Paciente</label>
                <input type="text" placeholder="Pesquisar paciente">
            </div>
            <div class="form-group">
                <label>Status</label>
                    <select>
                        <option>Todos</option>
                        <option>Concluído</option>
                        <option>Em análise</option>
                        <option>Processando</option>
                    </select>
                </div>
            </div>
        </div>
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Resultado</th>
                    </tr>
                </thead>
                <tbody id="historico-body">
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
