<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title> Fila de Prioridade </title> 
</head>
<script>

async function carregarFila() {

    const resposta = await fetch(
        "http://127.0.0.1:8000/ranking"
    );

    const dados = await resposta.json();

    const tbody = document.getElementById("fila-body");

    tbody.innerHTML = "";

    dados.forEach(paciente => {

        tbody.innerHTML += `
        <tr>
            <td>${paciente.id}</td>
            <td>${paciente.score.toFixed(4)}</td>
            <td>${(paciente.score * 100).toFixed(2)}%</td>
            <td>${new Date().toLocaleDateString()}</td>
        </tr>
        `;
    });
}

carregarFila();

</script>
<body>

    <aside class="sidebar">
    <div class="sidebar-topo">
        <h2>Sistema de Triagem</h2>
        <p>Glaucoma</p>
    </div>
    <nav class="sidebar-menu">
        <a href="Dashboard.html">
            Dashboard
        </a>
        <a href="NovaAnalise.html">
            Nova Análise
        </a>
        <a href="Historico.html">
            Histórico
        </a>
        <a href="ResultadoIA.html">
            Resultado IA
        </a>
        <a href="FilaPrioridade.html" class="ativo">
            Fila de Prioridade
        </a>
        <a href="Metricas.html">
            Métricas
        </a>
    </nav>
    <div class="sidebar-rodape">
        <span>Administrador</span>
    </div>
    </aside>
    <main class="main">
        <header class="page-header">
            <div>
                <h1>Fila de Prioridade</h1>
                <p>Pacientes ordenados conforme o resultado da triagem.</p>
            </div>
        </header>
        <div class="filtros">
        </div>
        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Resultado</th>
                        <th>Confiança</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="fila-body">
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
