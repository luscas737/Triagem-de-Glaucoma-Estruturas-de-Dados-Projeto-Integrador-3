<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Análise</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-topo">
            <h2>Sistema de Triagem</h2>
            <p>Glaucoma</p>
        </div>

        <nav class="sidebar-menu">
            <a href="Dashboard.html">Dashboard</a>
            <a href="NovaAnalise.html" class="ativo">Nova Análise</a>
            <a href="Historico.html">Histórico</a>
            <a href="ResultadoIA.html">Resultado IA</a>
            <a href="FilaPrioridade.html">Fila de Prioridade</a>
            <a href="Metricas.html">Métricas</a>
        </nav>

        <div class="sidebar-rodape">
            <span>Administrador</span>
        </div>
    </aside>

    <main class="main">

        <header class="page-header">
            <h1>Nova Análise</h1>
            <p>Envie uma imagem para análise automática.</p>
        </header>

        <div class="card">

            <h2>Dados do Paciente</h2>

            <div class="form-group">
                <label>ID do Paciente</label>
                <input type="number" id="id" placeholder="Digite o ID">
            </div>

            <div class="form-group">
                <label>Imagem do Exame</label>
                <input
                    type="file"
                    id="imagemArquivo"
                    accept=".jpg,.jpeg,.png"
                    onchange="mostrarImagem()">
            </div>

        </div>

        <div class="card">

            <h2>Pré-visualização</h2>

            <img
                id="preview"
                src=""
                alt="Pré-visualização"
                style="
                    max-width: 400px;
                    max-height: 400px;
                    display:none;
                    border-radius:8px;
                ">

        </div>

        <button
            class="button"
            onclick="analisarExame()">

            Analisar Exame

        </button>

    </main>
    <script>

    function mostrarImagem() {

        const arquivo =
            document.getElementById("imagemArquivo").files[0];

        if (!arquivo) return;

        const preview =
            document.getElementById("preview");

        preview.src =
            URL.createObjectURL(arquivo);

        preview.style.display = "block";
    }

    async function analisarExame() {

        try {

            const id =
                Number(
                    document.getElementById("id").value
                );

            const arquivo =
                document.getElementById("imagemArquivo").files[0];

            if (!id) {
                alert("Informe o ID do paciente");
                return;
            }

            if (!arquivo) {
                alert("Selecione uma imagem");
                return;
            }

            const formData = new FormData();

            formData.append("id", id);
            formData.append("imagem", arquivo);

            const resposta =
                await fetch(
                    "http://127.0.0.1:8000/pacientes",
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const dados =
                await resposta.json();
                console.log(dados)
            if (!resposta.ok) {
                throw new Error(
                    dados.detail || "Erro ao cadastrar paciente"
                );
            }

            alert(
                "Paciente cadastrado!\n\n" +
                "ID: " + dados.id +
                "\nScore: " + dados.score.toFixed(4)
            );

        } catch (erro) {

            console.error(erro);

            alert(
                erro.message ||
                "Erro ao comunicar com a API."
            );
        }
    }

    </script>

</body>
</html>
